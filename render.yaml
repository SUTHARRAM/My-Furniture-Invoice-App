services:
  - type: web
    name: furniture-invoice-backend
    runtime: docker
    dockerContext: ./backend
    envVars:
      - key: PORT
        value: 8080
      - key: GIN_MODE
        value: release
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: invoice_app
      - key: JWT_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 168h
      - key: PDF_STORAGE_PATH
        value: /app/storage/pdfs
      - key: ALLOWED_ORIGINS
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_NAME
        value: Invoice App
      - key: BUSINESS_NAME
        value: "Carp. Ramesh Kumar Suthar"
      - key: BUSINESS_PHONE
        value: "9660600709"
      - key: BUSINESS_EMAIL
        value: rc42847@gmail.com

  - type: web
    name: furniture-invoice-frontend
    runtime: static
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: ./build
    rootDir: frontend
    envVars:
      - key: REACT_APP_API_URL
        sync: false
      - key: SKIP_PREFLIGHT_CHECK
        value: "true"
      - key: DISABLE_ESLINT_PLUGIN
        value: "true"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
